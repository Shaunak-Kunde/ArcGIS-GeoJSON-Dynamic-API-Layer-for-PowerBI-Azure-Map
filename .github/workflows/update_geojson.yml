name: Update GeoJSON

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch ArcGIS layers
        run: |
          curl -L "https://services3.arcgis.com/Fqk0gVrfcnumlR5m/arcgis/rest/services/חלקות_חקלאיות_בישובים_מתוכננים/FeatureServer/0/query?where=1=1&outFields=*&f=geojson" -o layer1.json
          curl -L "https://services8.arcgis.com/x3OYmfTujNHGdoex/arcgis/rest/services/Palestine_border/FeatureServer/4/query?where=1=1&outFields=*&f=geojson" -o layer2.json
          curl -L "https://services2.arcgis.com/xMRYm7cNgdR5RN6F/arcgis/rest/services/Haifa_/FeatureServer/0/ query?where=1=1&outFields=*&f=geojson" -o layer3.json


      - name: Merge layers
        run: |
          python <<EOF
          import json

          files = ["layer1.json","layer2.json","layer3.json"]
          all_features=[]

          for f in files:
              with open(f,encoding="utf-8") as file:
                  data=json.load(file)
                  if "features" in data:
                      all_features.extend(data["features"])

          output={
              "type":"FeatureCollection",
              "features":all_features
          }

          with open("combined_layers_3.geojson","w",encoding="utf-8") as f:
              json.dump(output,f)

          print("Merged features:",len(all_features))
          EOF

      - name: Commit updated GeoJSON
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add combined_layers_3.geojson

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update GeoJSON"
            git push
          fi
